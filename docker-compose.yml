services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drshoes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drshoes-dev-secret}
      POSTGRES_DB: ${POSTGRES_DB:-drshoes}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drshoes}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-drshoes}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-drshoes-dev-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-drshoes} ${MINIO_ROOT_PASSWORD:-drshoes-dev-secret};
      mc mb -p local/${MINIO_BUCKET:-drshoes-dev} || true;
      mc anonymous set download local/${MINIO_BUCKET:-drshoes-dev} || true;
      exit 0;
      "

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
      - "${JAEGER_UI_PORT:-16686}:16686"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 10s
      timeout: 3s
      retries: 6

  backend:
    build:
      context: ./backend
      dockerfile: app/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-drshoes}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-drshoes}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-drshoes-dev-secret}
      DRSHOES_STORAGE_ENDPOINT: http://minio:9000
      DRSHOES_STORAGE_BUCKET: ${MINIO_BUCKET:-drshoes-dev}
      DRSHOES_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-drshoes}
      DRSHOES_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-drshoes-dev-secret}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      DRSHOES_DEMO_SEED_ENABLED: ${DRSHOES_DEMO_SEED_ENABLED:-false}
      # Outbound email. Defaults to "logging" (no real send) so the stack boots
      # without any SMTP secret. Set MESSAGING_EMAIL_PROVIDER=smtp + the
      # SPRING_MAIL_* vars in your local .env to send real mail. Never commit
      # the password.
      MESSAGING_EMAIL_PROVIDER: ${MESSAGING_EMAIL_PROVIDER:-logging}
      MESSAGING_EMAIL_SMTP_FROM: ${MESSAGING_EMAIL_SMTP_FROM:-noreply@drshoes.local}
      MESSAGING_EMAIL_SMTP_FROM_NAME: ${MESSAGING_EMAIL_SMTP_FROM_NAME:-Dr Shoes}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-465}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT: "10000"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT: "15000"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT: "15000"
      # Workshop identity — bound to WorkshopProperties @ drshoes.workshop.*
      DRSHOES_WORKSHOP_NAME: ${DRSHOES_WORKSHOP_NAME:-Dr Shoes}
      DRSHOES_WORKSHOP_ADDRESS: ${DRSHOES_WORKSHOP_ADDRESS:-Aleje Karola Marcinkowskiego 26, 61-745 Poznań}
      DRSHOES_WORKSHOP_OPENING_HOURS: ${DRSHOES_WORKSHOP_OPENING_HOURS:-pon–pt 10:00–18:00 · sob 11:00–15:00}
      DRSHOES_WORKSHOP_URL: ${DRSHOES_WORKSHOP_URL:-https://drshoes.pl}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
      INTERNAL_API_BASE: http://backend:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      NEXT_PUBLIC_OTLP_ENDPOINT: /api/otlp
      # Fix Docker Desktop macOS ERR_ABORTED on chunked RSC streaming:
      # keepAliveTimeout=0 forces Connection: close on each response so
      # Docker Desktop's host port-forward proxy never drops a mid-stream
      # TCP connection (which Chromium is sensitive to, unlike curl).
      KEEP_ALIVE_TIMEOUT: 0
    ports:
      - "${WEB_PORT:-3000}:3000"

  # E2E runner — only active under `docker compose --profile e2e run playwright`.
  # Runs Playwright tests from INSIDE the Docker network (web:3000) so chunked
  # RSC streaming is not filtered through Docker Desktop's macOS host port-forward,
  # which drops TCP connections mid-stream causing ERR_ABORTED in headless Chromium.
  #
  # Usage:
  #   docker compose --profile e2e run --rm playwright
  #
  # Results land on the host at apps/web/test-results/ via the bind mount.
  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    profiles: ["e2e"]
    depends_on:
      web:
        condition: service_started
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      # Internal Docker DNS — bypasses Docker Desktop macOS port-forward proxy
      BASE_URL: http://web:3000
      JAEGER_URL: http://jaeger:16686
      # pnpm store inside the container
      PNPM_HOME: /workspace/.pnpm-store
    command: >
      bash -c "
        corepack enable &&
        corepack prepare pnpm@9.12.3 --activate &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @drshoes/web exec playwright install chromium &&
        pnpm --filter @drshoes/web test:e2e
      "

volumes:
  db_data:
  minio_data:
