spring:
  application:
    name: drshoes-app
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080
  forward-headers-strategy: framework
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    git:
      mode: simple

drshoes:
  email:
    provider: NOOP
  sms:
    provider: NOOP

logging:
  pattern:
    level: "%5p [trace=%X{traceId:-},span=%X{spanId:-}]"
