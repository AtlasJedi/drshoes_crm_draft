spring:
  application:
    name: drshoes-app
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
  session:
    jdbc:
      initialize-schema: never
      table-name: SPRING_SESSION
    timeout: 30m

server:
  port: 8080
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    session:
      cookie:
        name: dr_session
        http-only: true
        secure: false
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    git:
      mode: simple

drshoes:
  email:
    provider: NOOP
  sms:
    provider: NOOP
  demo:
    seed:
      enabled: ${DRSHOES_DEMO_SEED_ENABLED:false}

logging:
  pattern:
    level: "%5p [trace=%X{traceId:-},span=%X{spanId:-}]"

otel:
  sdk:
    disabled: false
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
      protocol: http/protobuf
  resource:
    attributes:
      service.name: drshoes-app
      service.namespace: drshoes
      deployment.environment: ${DEPLOYMENT_ENV:local}
  traces:
    sampler: always_on
