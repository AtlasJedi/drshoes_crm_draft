spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/drshoes}
    username: ${SPRING_DATASOURCE_USERNAME:drshoes}
    password: ${SPRING_DATASOURCE_PASSWORD:drshoes-dev-secret}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

drshoes:
  security:
    # Disable CSRF in local/dev/E2E — Playwright bypasses the browser login page
    # so the XSRF-TOKEN cookie is never received, causing all POSTs to fail 403.
    # Production default (true) is set by the absence of this property.
    csrf-enabled: false
  auth:
    throttle:
      # Local/dev/E2E: throttle disabled entirely so debugging and test
      # retries are not blocked by the 429 wall.
      # Production default (enabled, 5 per 15 min) is set in LoginThrottleConfig.
      enabled: false
      capacity: 1000
      window-minutes: 1
  storage:
    endpoint: ${DRSHOES_STORAGE_ENDPOINT:http://localhost:9000}
    bucket: ${DRSHOES_STORAGE_BUCKET:drshoes-dev}
    access-key: ${DRSHOES_STORAGE_ACCESS_KEY:drshoes}
    secret-key: ${DRSHOES_STORAGE_SECRET_KEY:drshoes-dev-secret}
    region: us-east-1
    path-style-access: true
  demo:
    seed:
      enabled: true

otel:
  exporter:
    otlp:
      endpoint: http://jaeger:4318
  resource:
    attributes:
      deployment.environment: local
