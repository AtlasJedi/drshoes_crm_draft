<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>M5 · Wiadomości — design handoff</title>
<meta name="viewport" content="width=1480" />
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        colors: {
          paper:     '#f7f5ef',
          ink:       '#0f0f0f',
          'admin-mute': '#6b6760',
          'admin-line': '#e3ddd0',
          'admin-hover': '#efece2',
          acid:      '#d8ff3a',
          'acid-deep': '#b8df1f',
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', ui-sans-serif, system-ui; background: #ebe7dc; color: #0f0f0f; }
  .meta-tag { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: .02em; }
  .frame-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: #6b6760;
    letter-spacing: .04em;
  }
  .frame-shadow {
    box-shadow:
      0 0 0 1px #d4ccb8,
      0 1px 2px rgba(0,0,0,.04),
      0 8px 24px -8px rgba(0,0,0,.08);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="MessagesPage.jsx"></script>
<script type="text/babel" src="OrderDrawerBanner.jsx"></script>
<script type="text/babel" src="SidebarItem.jsx"></script>
<script type="text/babel" src="StatesAndEmpty.jsx"></script>

<script type="text/babel">
const { MessagesPage, OrderDrawerBannerShowcase, SidebarItemShowcase, EmptyAndStates } = window.M5;

function FrameSection({ label, file, notes, children, w }) {
  return (
    <section className="mb-16">
      <header className="mb-3 flex items-baseline justify-between max-w-[1400px]" style={{ width: w }}>
        <div>
          <div className="frame-label uppercase">{label}</div>
          {file && <div className="meta-tag text-admin-mute mt-1"><span className="text-ink/70">file:</span> {file}</div>}
        </div>
        {notes && <div className="text-xs text-admin-mute max-w-md text-right leading-relaxed">{notes}</div>}
      </header>
      <div className="frame-shadow rounded-md overflow-hidden bg-white" style={{ width: w }}>
        {children}
      </div>
    </section>
  );
}

function App() {
  return (
    <div className="min-h-screen px-12 py-12">
      <header className="mb-10 max-w-[1400px]">
        <div className="flex items-center gap-3">
          <span className="meta-tag bg-ink text-paper px-2 py-1 rounded-sm">M5</span>
          <h1 className="text-3xl font-semibold tracking-tight">Wiadomości — admin design pack</h1>
        </div>
        <p className="text-admin-mute mt-2 max-w-2xl text-[15px] leading-relaxed">
          Trzy artefakty do <code className="meta-tag bg-admin-line/60 px-1 rounded">/admin/messages</code>:
          pełna strona inboxu, banner w <code className="meta-tag bg-admin-line/60 px-1 rounded">OrderDrawer</code> oraz nawigacyjny element sidebara.
          Wszystko klasy Tailwind, Radix primitives, Polish UI. Tokeny: <span className="meta-tag">paper · ink · acid · admin-mute · admin-line</span>.
        </p>
      </header>

      <FrameSection
        label="Artifact 1 / Pełna strona inboxu"
        file="apps/web/app/(admin)/admin/messages/page.tsx"
        notes="Trzy kolumny: filtry+lista (380px) · log wątku · panel klienta (320px). Composer przyklejony do dołu. Selected wątek ma acid-1 left border."
        w={1400}
      >
        <MessagesPage />
      </FrameSection>

      <FrameSection
        label="Artifact 1.1 / Stany specjalne strony inboxu"
        file="…/_components/Empty*.tsx + LoadingStates.tsx"
        notes="Empty (brak wątków · brak wybranego · pusty filtr) i unmatched-thread w panelu po prawej."
        w={1400}
      >
        <EmptyAndStates />
      </FrameSection>

      <div className="grid grid-cols-2 gap-12 max-w-[1400px]">
        <FrameSection
          label="Artifact 2 / OrderDrawer banner"
          file="…/orders/_components/OrderDrawer/UnreadElsewhereBanner.tsx"
          notes="Notice (nie alert). Nad listą wiadomości w zakładce Wiadomości."
          w={580}
        >
          <OrderDrawerBannerShowcase />
        </FrameSection>

        <FrameSection
          label="Artifact 3 / Sidebar item z licznikiem"
          file="…/_components/Sidebar/MessagesNavItem.tsx"
          notes="Trzy stany: 0 / 1–99 / 100+. Match istniejący sidebar."
          w={300}
        >
          <SidebarItemShowcase />
        </FrameSection>
      </div>

      <footer className="mt-12 max-w-[1400px] border-t border-admin-line pt-6 text-xs text-admin-mute leading-relaxed">
        <div className="font-semibold text-ink mb-2 text-sm">Nowe tokeny / decyzje designowe</div>
        <ul className="grid grid-cols-2 gap-x-8 gap-y-1.5 list-disc pl-5">
          <li><span className="meta-tag">acid</span> = #d8ff3a — primary action (przycisk Wyślij, active filter chip).</li>
          <li><span className="meta-tag">admin-mute</span> = #6b6760 — secondary copy, timestamps, meta.</li>
          <li><span className="meta-tag">admin-line</span> = #e3ddd0 — divider, border domyślny.</li>
          <li>INBOUND vs OUTBOUND: alignment (lewy/prawy) + bg (white/ink-bordered vs paper-2).</li>
          <li>Niesparowane: różowy ⚠ ikon, raw sender w monospace.</li>
          <li>Status badge: reuse istniejącego <span className="meta-tag">MessageStatusBadge</span>.</li>
          <li>Filtr chip active: bg-ink text-acid · idle: bg-white border-admin-line.</li>
          <li>Composer EMAIL: subject input pojawia się; SMS: ukryty + counter 160 znaków.</li>
        </ul>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
