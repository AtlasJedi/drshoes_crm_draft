<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>Dr Shoes — Workshop Site + Admin CRM</title>
<meta name="viewport" content="width=1400" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Big+Shoulders+Stencil+Display:wght@700;800;900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />

<style>
  body, html { background: #f0eee9; }
  .canvas-meta {
    position: fixed; top: 14px; left: 14px; z-index: 1000;
    background: var(--ink); color: var(--paper);
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    border: 2px solid var(--paper);
    box-shadow: 3px 3px 0 var(--acid), 3px 3px 0 1.5px var(--paper);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="more.jsx"></script>

<script type="text/babel">
const { Landing } = window;
const { AdminDashboard, OrdersList, CalendarView, KanbanView, Messaging, Triggers, ShopAdmin } = window.AdminScreens;
const { MobileLanding, ReservationModal, CustomIntake } = window.MoreScreens;

function App() {
  return (
    <>
      <DesignCanvas>
        <DCSection id="overview" title="Dr Shoes" subtitle="Workshop site + admin CRM · graffiti aesthetic · 2026">

          <DCArtboard id="ds-summary" label="Design system · cheat sheet" width={1100} height={760}>
            <DesignSystemSummary />
          </DCArtboard>

        </DCSection>

        <DCSection id="landing" title="Layer 1 · Landing (publiczny)" subtitle="Single long-scroll page · graffiti at full volume">
          <DCArtboard id="landing-desktop" label="Landing — desktop · pełna strona (przewiń)" width={1280} height={3400}>
            <Landing />
          </DCArtboard>
          <DCArtboard id="landing-mobile" label="Landing — mobile" width={390} height={2400}>
            <MobileLanding />
          </DCArtboard>
          <DCArtboard id="reservation-modal" label="Sklep · modal rezerwacji" width={780} height={780}>
            <ReservationModal />
          </DCArtboard>
          <DCArtboard id="custom-intake" label="Formularz custom intake" width={1100} height={1300}>
            <CustomIntake />
          </DCArtboard>
        </DCSection>

        <DCSection id="admin" title="Layer 2 · Admin CRM (panel pracowni)" subtitle="Graffiti dialed back to UI accents — function over flair in dense views">
          <DCArtboard id="admin-dash" label="Dashboard" width={1400} height={920}>
            <AdminDashboard />
          </DCArtboard>
          <DCArtboard id="orders-list" label="Zamówienia · lista + filtry" width={1400} height={920}>
            <OrdersList />
          </DCArtboard>
          <DCArtboard id="orders-drawer" label="Zamówienia · drawer szczegółów" width={1400} height={920}>
            <OrdersList withDrawer />
          </DCArtboard>
          <DCArtboard id="calendar" label="Kalendarz" width={1400} height={920}>
            <CalendarView />
          </DCArtboard>
          <DCArtboard id="kanban" label="Kanban" width={1400} height={920}>
            <KanbanView />
          </DCArtboard>
          <DCArtboard id="messaging" label="Wiadomości · zunifikowana skrzynka" width={1400} height={920}>
            <Messaging />
          </DCArtboard>
          <DCArtboard id="triggers" label="Triggery · automatyzacja wiadomości" width={1400} height={920}>
            <Triggers />
          </DCArtboard>
          <DCArtboard id="shop-admin" label="Sklep · CRUD + rezerwacje" width={1400} height={920}>
            <ShopAdmin />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </>
  );
}

// Design system one-pager
function DesignSystemSummary() {
  const { Tape, Stamp, Sticker, PhImg, Pill, SprayCanIcon, ShoeIcon, BrushIcon, JacketIcon, I, DrShoesMark } = window.DrShoes;
  return (
    <div style={{ background: "var(--paper)", padding: 36, height: "100%", boxSizing: "border-box", overflow: "hidden", fontFamily: "var(--font-body)", position: "relative" }}>
      {/* header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <Tape>design system · v0.1</Tape>
          <h1 className="t-display" style={{ fontSize: 80, margin: "12px 0 0", lineHeight: 0.9 }}>
            Dr<span style={{ color: "var(--pink)", WebkitTextStroke: "2px var(--ink)" }}>.</span>System
          </h1>
          <div className="t-tag" style={{ fontSize: 22, color: "var(--blue)", transform: "rotate(-1.5deg)", marginTop: 4 }}>street energy, gridded structure</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
          <Sticker>est. 2014</Sticker>
          <span className="t-mono" style={{ fontSize: 11, color: "rgba(0,0,0,0.55)" }}>Wrocław · drshoes.pl</span>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr 1fr", gap: 22 }}>
        {/* type */}
        <div>
          <SectionLabel>Type</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <TypeRow font="var(--font-display)" name="Anton — display" sample="GRAFFITI" size={48} />
            <TypeRow font="var(--font-stencil)" name="Big Shoulders Stencil — UI display" sample="STATUS / LABEL" size={26} />
            <TypeRow font="var(--font-tag)" name="Permanent Marker — tag" sample="świeże ✦ pilne" size={26} />
            <TypeRow font="var(--font-body)" name="Inter Tight — body" sample="Kompletna pracownia szewska, robione ręcznie." size={15} />
            <TypeRow font="var(--font-mono)" name="JetBrains Mono — meta" sample="DR-1042 · 02.05.26" size={13} />
          </div>
        </div>

        {/* palette */}
        <div>
          <SectionLabel>Palette</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8 }}>
            <Sw v="#0a0a0a" name="ink" sub="bg / type" dark />
            <Sw v="#f4efe6" name="paper" sub="surface" />
            <Sw v="#d8ff3a" name="acid" sub="accent · CTA" />
            <Sw v="#ff2e7e" name="pink" sub="urgent / hot" />
            <Sw v="#2b5cff" name="blue" sub="info / link" />
            <Sw v="#ff5a1f" name="orange" sub="in-progress" />
          </div>
          <div style={{ marginTop: 12, padding: 10, border: "1.5px dashed var(--ink)" }}>
            <div className="t-mono" style={{ fontSize: 10, color: "rgba(0,0,0,0.55)", letterSpacing: ".1em" }}>RULE</div>
            <div style={{ fontSize: 12, marginTop: 4, lineHeight: 1.45 }}>Landing — two accents loud at once OK. Admin — accents only on chips, badges, active state. Never both.</div>
          </div>
        </div>

        {/* status pills */}
        <div>
          <SectionLabel>Status — site (sprayed)</SectionLabel>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <Stamp color="green">dostępne</Stamp>
            <Stamp color="pink">rezerwacja</Stamp>
            <Stamp color="ink" angle={-3}>sprzedane</Stamp>
          </div>

          <SectionLabel style={{ marginTop: 18 }}>Status — admin (clean)</SectionLabel>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            <Pill status="przyjęte" />
            <Pill status="w realizacji" />
            <Pill status="czeka na klienta" />
            <Pill status="gotowe do odbioru" />
            <Pill status="wydane" />
            <Pill status="anulowane" />
          </div>
        </div>
      </div>

      {/* second row */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 22, marginTop: 28 }}>
        <div>
          <SectionLabel>Buttons (loud)</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "flex-start" }}>
            <button className="btn btn-acid btn-sm"><SprayCanIcon size={14} /> Zamów custom</button>
            <button className="btn btn-pink btn-sm">Zarezerwuj</button>
            <button className="btn btn-paper btn-sm">Drugorzędna</button>
            <button className="btn btn-ghost btn-sm">Ghost link</button>
          </div>
        </div>
        <div>
          <SectionLabel>Buttons (admin)</SectionLabel>
          <div className="admin" style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "flex-start" }}>
            <button className="btn-clean primary">Zapisz</button>
            <button className="btn-clean acid">Wyślij update</button>
            <button className="btn-clean">Drugorzędna</button>
            <button className="btn-clean" style={{ color: "var(--red)", borderColor: "var(--red)" }}>Anuluj</button>
          </div>
        </div>
        <div>
          <SectionLabel>Decorations</SectionLabel>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, alignItems: "flex-start" }}>
            <Tape>masking tape</Tape>
            <Tape color="pink" angle={2}>tape · pink</Tape>
            <Tape color="blue" angle={-1}>tape · blue</Tape>
            <Sticker>okrągła naklejka</Sticker>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 26, padding: 16, background: "var(--ink)", color: "var(--paper)", display: "flex", alignItems: "center", gap: 18 }}>
        <DrShoesMark size={0.4} color="var(--paper)" accent="var(--acid)" />
        <div className="t-mono" style={{ fontSize: 12, lineHeight: 1.5, opacity: 0.85, flex: 1 }}>
          <strong style={{ color: "var(--acid)" }}>Interakcje:</strong> hover zoom 1.4–1.55× z lekkim obrotem · spray-paint reveals na entry · drag-and-drop na kanbanie i kalendarzu · drawer slide-in z prawej · kursor crosshair na CTA.
        </div>
      </div>
    </div>
  );
}

function SectionLabel({ children, style }) {
  return (
    <div className="t-stencil" style={{ fontSize: 12, letterSpacing: ".15em", color: "var(--ink)", paddingBottom: 6, marginBottom: 12, borderBottom: "2px solid var(--ink)", ...style }}>{children}</div>
  );
}
function TypeRow({ font, name, sample, size }) {
  return (
    <div style={{ borderBottom: "1px dashed rgba(0,0,0,0.15)", paddingBottom: 8 }}>
      <div className="t-mono" style={{ fontSize: 10, color: "rgba(0,0,0,0.55)", letterSpacing: ".1em", textTransform: "uppercase" }}>{name}</div>
      <div style={{ fontFamily: font, fontSize: size, lineHeight: 1.05, marginTop: 4, ...(font.includes("Stencil") || font.includes("Anton") ? { textTransform: "uppercase" } : {}) }}>{sample}</div>
    </div>
  );
}
function Sw({ v, name, sub, dark }) {
  return (
    <div style={{ border: "1.5px solid var(--ink)", padding: 8, background: "#fff" }}>
      <div style={{ background: v, height: 38, border: "1px solid var(--ink)" }} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 6 }}>
        <span style={{ fontFamily: "var(--font-stencil)", fontSize: 12, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase" }}>{name}</span>
        <span className="t-mono" style={{ fontSize: 9, color: "rgba(0,0,0,0.5)" }}>{v}</span>
      </div>
      <div className="t-mono" style={{ fontSize: 10, color: "rgba(0,0,0,0.5)", marginTop: 2 }}>{sub}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
